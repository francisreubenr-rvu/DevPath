<!DOCTYPE html>
<html>
<head>
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="lab6b_calculator.css">
</head>
<body>
  <main class="container">
    <h1>Simple Calculator</h1>

    <label for="num1">First number</label>
    <input type="number" id="num1">

    <label for="num2">Second number</label>
    <input type="number" id="num2">

    <div class="buttons">
      <button type="button" onclick="calculate('sum')">Sum</button>
      <button type="button" onclick="calculate('product')">Product</button>
      <button type="button" onclick="calculate('difference')">Difference</button>
      <button type="button" onclick="calculate('quotient')">Quotient</button>
    </div>

    <p id="result"></p>
  </main>

  <script>
    function calculate(operation) {
      var a = parseFloat(document.getElementById("num1").value);
      var b = parseFloat(document.getElementById("num2").value);
      var resultElement = document.getElementById("result");

      if (isNaN(a) || isNaN(b)) {
        resultElement.textContent = "Please enter both numbers.";
        return;
      }

      var value;

      if (operation === "sum") {
        value = a + b;
      } else if (operation === "product") {
        value = a * b;
      } else if (operation === "difference") {
        value = a - b;
      } else if (operation === "quotient") {
        if (b === 0) {
          resultElement.textContent = "Cannot divide by zero.";
          return;
        }
        value = a / b;
      }

      resultElement.textContent = "Result: " + value;
    }
  </script>
</body>
</html>
