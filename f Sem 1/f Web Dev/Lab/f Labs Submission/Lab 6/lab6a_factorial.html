<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="lab6a_factorial.css">
  <title>Factorial Calculator</title>
</head>
<body>
  <main class="container">
    <h1>Factorial Calculator</h1>

    <label for="number">Enter a number:</label>
    <input type="number" id="number" min="0">
    <button type="button" onclick="computeFactorial()">Compute</button>

    <p id="result"></p>
  </main>

  <script>
    function computeFactorial() {
      var n = parseInt(document.getElementById("number").value);
      var resultElement = document.getElementById("result");

      if (isNaN(n) || n < 0) {
        resultElement.textContent = "Please enter a non-negative integer.";
        return;
      }

      var fact = 1;
      for (var i = 1; i <= n; i++) {
        fact = fact * i;
      }

      resultElement.textContent = "Factorial of " + n + " is " + fact + ".";
    }
  </script>
</body>
</html>
