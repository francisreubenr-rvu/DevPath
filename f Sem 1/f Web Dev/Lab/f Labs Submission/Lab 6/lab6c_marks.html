<!DOCTYPE html>
<html>
<head>
  <title>Student Marks Form</title>
  <link rel="stylesheet" href="lab6c_marks.css">
</head>
<body>
  <main class="container">
    <h1>Student Marks</h1>

    <form id="marksForm" onsubmit="showMarks(event)">
      <label for="name">Student Name</label>
      <input type="text" id="name" required>

      <label for="reg">Register Number</label>
      <input type="text" id="reg" required>

      <label for="sub1">Subject 1 Marks</label>
      <input type="number" id="sub1" min="0" max="100" required>

      <label for="sub2">Subject 2 Marks</label>
      <input type="number" id="sub2" min="0" max="100" required>

      <label for="sub3">Subject 3 Marks</label>
      <input type="number" id="sub3" min="0" max="100" required>

      <button type="submit">Submit</button>
    </form>

    <section id="output"></section>
  </main>

  <script>
    function showMarks(event) {
      event.preventDefault();

      var name = document.getElementById("name").value;
      var reg = document.getElementById("reg").value;
      var m1 = parseInt(document.getElementById("sub1").value);
      var m2 = parseInt(document.getElementById("sub2").value);
      var m3 = parseInt(document.getElementById("sub3").value);

      var total = m1 + m2 + m3;
      var average = total / 3;

      var output = document.getElementById("output");
      output.innerHTML =
        "<h2>Student Details</h2>" +
        "<p>Name: " + name + "</p>" +
        "<p>Register Number: " + reg + "</p>" +
        "<p>Subject 1: " + m1 + "</p>" +
        "<p>Subject 2: " + m2 + "</p>" +
        "<p>Subject 3: " + m3 + "</p>" +
        "<p>Total: " + total + "</p>" +
        "<p>Average: " + average.toFixed(2) + "</p>";
    }
  </script>
</body>
</html>
