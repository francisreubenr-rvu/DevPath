<html>
<head>
    <title>key Down example</title>
</head>
<body>
    <input id = "input2" type = "text">
    <p id = "output2"></p>
    <script>
        var input2 = document.getElementById("input2").addEventListener("keydown", function(event) {
            document.getElementById("output2").innerHTML = "You pressed: " + event.key;
        });
    </script>
</body>
</html>
