<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
    <input id="num1Input" type="number">
    <input id="num2Input" type="number">
<button id="showBtn" type="button">Show</button>
    </form>
<p id="result" style="color: red;"></p>
<script>
  const num1Input = document.getElementById("num1Input");
  const num2Input = document.getElementById("num2Input");
  const showBtn = document.getElementById("showBtn");
  const resultPara = document.getElementById("result");

  showBtn.addEventListener("click", function() {
    const num1 = num1Input.value;
    const num2 = num2Input.value;
    const res=(num1*num2);
    resultPara.textContent = res;
    resultPara.style.color = "blue";
    resultPara.style.fontSize = "20px";
    resultPara.style.fontWeight = "bold";
    resultPara.style.fontFamily = "Arial, sans-serif";
    resultPara.style.textAlign = "center";
    resultPara.style.textDecoration = "underline";
    resultPara.style.backgroundColor = "lightgray";
    resultPara.style.padding = "10px";
    resultPara.style.border = "2px solid black";
    resultPara.style.borderRadius = "5px";
    resultPara.style.marginTop = "10px";
    resultPara.style.width = "fit-content";
    resultPara.style.marginLeft = "auto";
    resultPara.style.marginRight = "auto";
    resultPara.style.boxShadow = "2px 2px 5px rgba(0, 0, 0, 0.3)"; 
    resultPara.style.letterSpacing = "2px";
    resultPara.style.lineHeight = "1.5";
    resultPara.style.textTransform = "uppercase";
    resultPara.style.wordSpacing = "4px";
    resultPara.style.whiteSpace = "pre-wrap";
    resultPara.style.opacity = "0.9";
    resultPara.style.zIndex = "10";
    resultPara.style.cursor = "pointer";
    resultPara.style.userSelect = "none";
    resultPara.style.transition = "all 0.3s ease";
    resultPara.style.animation = "fadeIn 1s ease-in-out";
    resultPara.style.filter = "blur(0px)";
    resultPara.style.transform = "scale(1)";
    resultPara.style.overflow = "hidden";
    resultPara.style.textOverflow = "ellipsis";
    resultPara.style.verticalAlign = "middle";
    resultPara.style.boxSizing = "border-box";
    resultPara.style.pointerEvents = "none";
    resultPara.style.mixBlendMode = "normal";
    resultPara.style.backdropFilter = "blur(5px)";
    resultPara.style.scrollBehavior = "smooth";
    resultPara.style.touchAction = "manipulation";
    resultPara.style.appearance = "none";
    resultPara.style.contain = "layout style paint";
    resultPara.style.isolation = "isolate";
    resultPara.style.willChange = "transform opacity";
    
  })
</script>

</body>
</html>
