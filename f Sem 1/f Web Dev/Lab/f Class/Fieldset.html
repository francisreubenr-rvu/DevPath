<!doctype HTML>
<html lang="en">
<head>
    <Input type = "Fieldset"(Form)>
</head>
<body>
 <form>
  <fieldset>
    <legend>Personal Information</legend>
    <label for="name">Name:</label>
    <input type="text" id="name" name="name"><br><br>
    <label for="email">Email:</label>
    <input type="email" id="email" name="email">
  </fieldset>
  <input type="submit">
</form>
</body>
</html>
