<!doctype html>
<html>
    <head>
        <title>Educational Event Registration</title>
        <link rel="stylesheet" href="stylesExp3.css" />
    </head>
    <body>
        <h1>Educational Event Registration</h1>
        <form action="submit.php" method="POST">
            <label for="firstName">First Name *</label>
            <input
                type="text"
                id="firstName"
                name="firstName"
                required
                minlength="2"
            /><br />

            <label for="lastName">Last Name *</label>
            <input
                type="text"
                id="lastName"
                name="lastName"
                required
                minlength="2"
            /><br />

            <label for="email">Email Address *</label>
            <input type="email" id="email" name="email" required /><br />

            <label for="phone">Phone Number *</label>
            <input
                type="tel"
                id="phone"
                name="phone"
                pattern="[0-9]{10}"
                placeholder="1234567890"
                required
            /><br />

            <label for="institution">Institution/School *</label>
            <input
                type="text"
                id="institution"
                name="institution"
                required
            /><br />

            <label for="course">Course *</label>
            <select id="course" name="course" required>
                <option value="">Select Course</option>
                <option value="computer-science">Computer Science</option>
                <option value="engineering">Engineering</option>
                <option value="business">Business</option>
                <option value="arts">Arts & Humanities</option>
                <option value="science">Science</option>
                <option value="other">Other</option></select
            ><br />

            <label for="year">Year of Study *</label>
            <select id="year" name="year" required>
                <option value="">Select Year</option>
                <option value="1">First Year</option>
                <option value="2">Second Year</option>
                <option value="3">Third Year</option>
                <option value="4">Fourth Year</option>
                <option value="other">Graduate/Other</option></select
            ><br />

            <label for="eventDate">Preferred Event Date *</label>
            <input type="date" id="eventDate" name="eventDate" required /><br />

            <label for="comments">Additional Comments</label>
            <textarea
                id="comments"
                name="comments"
                rows="3"
                placeholder="Any requirements or questions..."
            ></textarea
            ><br />

            <button type="submit">Submit Registration</button>
            <button type="reset">Reset Form</button>
        </form>
    </body>
</html>
