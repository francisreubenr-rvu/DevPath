<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Dropdown Menu</title>
    <style>
        /* BASIC STYLING */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f3;
        }

        nav {
            background-color: #333;
            padding: 0 20px;
        }

        /* MAIN NAVIGATION LIST */
        ul.nav-menu {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex; /* Aligns items horizontally */
        }

        /* MENU ITEMS */
        li.nav-item {
            position: relative; /* Crucial: Acts as an anchor for the dropdown */
        }

        li.nav-item a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        li.nav-item a:hover {
            background-color: #111;
        }

        /* --- DROPDOWN CONTENT --- */
        .dropdown-content {
            display: none; /* Hidden by default */
            position: absolute; /* Removes from flow, positions relative to parent li */
            top: 100%; /* Pushes it directly below the parent */
            left: 0;
            background-color: #f9f9f9;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1; /* Ensures it sits on top of other content */
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            text-align: left;
        }

        .dropdown-content a:hover {
            background-color: #ddd;
        }

        /* --- THE INTERACTION --- */
        /* When hovering over the parent (.nav-item), show the child (.dropdown-content) */
        .nav-item:hover .dropdown-content {
            display: block;
        }
    </style>
</head>
<body>

    <nav>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#">Home</a></li>
            
            <li class="nav-item">
                <a href="#">Services &#9662;</a> <div class="dropdown-content">
                    <a href="#">Web Design</a>
                    <a href="#">SEO</a>
                    <a href="#">Marketing</a>
                </div>
            </li>

            <li class="nav-item"><a href="#">About</a></li>
            <li class="nav-item"><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div style="padding: 20px;">
        <h1>Welcome to the Dropdown Demo</h1>
        <p>Hover over the "Services" menu item above to see the dropdown list appear.</p>
    </div>

</body>
</html>
