<!DOCTYPE html>
<html lang="en">
<head>
    <title>DevFlow Project Manager</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <div class="app-container">
        <nav class="sidebar">
            <div class="brand">DevFlow</div>
            <ul class="nav-links">
                <li class="active" onclick="switchView('dashboard')">📦 Projects Board</li>
                <li onclick="switchView('products')">🧬 Product Variations</li>
                <li onclick="switchView('github')">🐙 GitHub Templates</li>
            </ul>
            <div class="user-profile">
                <div class="avatar">JS</div>
                <span>Demo User</span>
            </div>
        </nav>

        <main class="main-content">
            
            <section id="dashboard" class="view active-view">
                <header class="view-header">
                    <h1>Project Roadmap</h1>
                    <button class="btn-primary" onclick="openModal()">+ New Task</button>
                </header>
                
                <div class="kanban-board">
                    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" id="todo">
                        <div class="column-header">
                            <span class="badge">To Do</span>
                            <span class="count" id="count-todo">0</span>
                        </div>
                        <div class="task-list" id="list-todo">
                            </div>
                    </div>

                    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" id="inprogress">
                        <div class="column-header">
                            <span class="badge badge-blue">In Progress</span>
                            <span class="count" id="count-inprogress">0</span>
                        </div>
                        <div class="task-list" id="list-inprogress"></div>
                    </div>

                    <div class="column" ondrop="drop(event)" ondragover="allowDrop(event)" id="done">
                        <div class="column-header">
                            <span class="badge badge-green">Done</span>
                            <span class="count" id="count-done">0</span>
                        </div>
                        <div class="task-list" id="list-done"></div>
                    </div>
                </div>
            </section>

            <section id="products" class="view hidden-view">
                <header class="view-header">
                    <h1>Product Configurations</h1>
                    <input type="text" id="product-search" placeholder="Filter configurations..." onkeyup="filterProducts()">
                </header>
                
                <div class="table-container">
                    <table class="product-table">
                        <thead>
                            <tr>
                                <th>Product Name</th>
                                <th>SKU</th>
                                <th>Origin Source</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="product-table-body">
                            </tbody>
                    </table>
                </div>
            </section>

            <section id="github" class="view hidden-view">
                <header class="view-header">
                    <h1>GitHub Templates</h1>
                    <p class="subtitle">Start projects from verified repo blueprints.</p>
                </header>
                
                <div class="repo-grid" id="repo-grid">
                    </div>
            </section>

        </main>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Create New Item</h2>
            <form id="taskForm" onsubmit="addTask(event)">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="taskTitle" required placeholder="e.g., Fix Navigation Bug">
                </div>
                <div class="form-group">
                    <label>Tag</label>
                    <select id="taskTag">
                        <option value="Feature">Feature</option>
                        <option value="Bug">Bug</option>
                        <option value="Design">Design</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add to Board</button>
            </form>
        </div>
    </div>

    <script src="script1.js"></script>
</body>
</html>
