<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject Viewer — Brio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..900&family=JetBrains+Mono:wght@400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background-image: none; /* Clean solid background for subject reading */
      background-color: var(--bg);
    }
    .subject-page-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      font-weight: 800;
      cursor: pointer;
      border: var(--border-width) solid var(--border);
      padding: 0.5rem 1rem;
      background: var(--glass-bg);
      box-shadow: var(--shadow);
      transition: all 0.2s;
    }
    .back-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-hover);
    }
    .back-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .reader-modal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(251, 248, 241, 0.95); /* Cream background with opacity */
      z-index: 1000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(5px);
    }
    .reader-modal.hidden {
      display: none;
    }
    .reader-header {
      padding: 1.5rem 2rem;
      border-bottom: var(--border-width) solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
    }
    .reader-title {
      font-size: 1.5rem;
      font-weight: 900;
      font-family: var(--font-serif);
    }
    .reader-body {
      flex: 1;
      overflow-y: auto;
      padding: 3rem 2rem;
      background: var(--bg);
    }
    .reader-text {
      max-width: 800px;
      margin: 0 auto;
      font-size: 1.1rem;
      line-height: 1.8;
    }
    .reader-text h1, .reader-text h2, .reader-text h3 {
      font-family: var(--font-serif);
      margin-top: 2rem;
      margin-bottom: 1rem;
    }
    .reader-text p {
      margin-bottom: 1.5rem;
    }
    .reader-text pre {
      background: var(--text);
      color: var(--bg);
      padding: 1rem;
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 1.5rem;
    }
    .reader-text ul, .reader-text ol {
      margin-bottom: 1.5rem;
      padding-left: 2rem;
    }
    .reader-text img {
      max-width: 100%;
      border: var(--border-width) solid var(--border);
      box-shadow: var(--shadow);
      margin: 2rem 0;
    }
    .mermaid {
      background: white;
      padding: 1rem;
      border: var(--border-width) solid var(--border);
      box-shadow: var(--shadow);
      margin: 2rem 0;
      text-align: center;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>mermaid.initialize({startOnLoad:false});</script>
</head>
<body>

<div class="subject-page-container">
  <button class="back-btn" onclick="window.close()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    Back to Dashboard
  </button>
  
  <div id="subject-content" style="display:none;">
    <div class="subject-hero">
      <div>
        <div class="subject-kicker" id="subject-semester"></div>
        <h2 id="subject-title"></h2>
        <p id="subject-overview"></p>
        <div class="subject-topics" id="subject-topics"></div>
      </div>
      <div class="subject-meta">
        <div><strong>Credits</strong><span id="subject-credits"></span></div>
        <div><strong>Difficulty</strong><span id="subject-difficulty"></span></div>
      </div>
    </div>

    <div class="card" style="margin-top:2rem;">
      <h3 style="font-family:var(--font-serif);font-size:1.8rem;margin-bottom:1rem;">Lessons</h3>
      <div id="subject-lessons"></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:2rem;">
      <div class="card">
        <h3 style="font-family:var(--font-serif);font-size:1.5rem;margin-bottom:1rem;">Quizzes</h3>
        <div id="subject-quizzes"></div>
      </div>
      <div>
        <div class="card" style="margin-bottom:2rem;">
          <h3 style="font-family:var(--font-serif);font-size:1.5rem;margin-bottom:1rem;">Assignments</h3>
          <ul id="subject-assignments" style="padding-left:1.5rem;line-height:2;"></ul>
        </div>
        <div class="card">
          <h3 style="font-family:var(--font-serif);font-size:1.5rem;margin-bottom:1rem;">Resources</h3>
          <ul id="subject-resources" style="padding-left:1.5rem;line-height:2;"></ul>
        </div>
      </div>
    </div>
  </div>
  
  <div id="error-message" style="display:none; text-align:center; padding: 4rem; font-weight: bold; font-size: 1.2rem; color: var(--accent-rust);">
    Subject not found.
  </div>
</div>

<!-- READER MODAL -->
<div id="reader-modal" class="reader-modal hidden">
  <div class="reader-header">
    <div class="reader-title" id="reader-title">Lesson Title</div>
    <button class="btn close-reader" onclick="closeReader()">X</button>
  </div>
  <div class="reader-body">
    <div id="reader-content" class="reader-text"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
  const PROGRESS_KEY = 'brio_progress_v1';
  let subjectsFlat = [];
  
  function getSubjectProgress(subjectId) {
    const raw = localStorage.getItem(PROGRESS_KEY);
    let store = null;
    try { store = raw ? JSON.parse(raw) : null; } catch(e) {}
    if (!store) store = { subjects: {} };
    if (!store.subjects) store.subjects = {};
    if (!store.subjects[subjectId]) store.subjects[subjectId] = { completedLessons: [], lastLessonId: null };
    return store.subjects[subjectId];
  }
  
  function saveSubjectProgress(subjectId, p) {
    const raw = localStorage.getItem(PROGRESS_KEY);
    let store = null;
    try { store = raw ? JSON.parse(raw) : null; } catch(e) {}
    if (!store) store = { subjects: {} };
    if (!store.subjects) store.subjects = {};
    store.subjects[subjectId] = p;
    store.lastSubjectId = subjectId;
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(store));
  }
  
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.innerText = msg;
    el.classList.add('show');
    setTimeout(() => { el.classList.remove('show'); }, 3000);
  }
  
  function openReaderById(lessonId) {
    if (!currentSubject) return;
    const lesson = currentSubject.lessons.find(l => l.id === lessonId);
    if (!lesson) return;
    document.getElementById('reader-title').innerText = lesson.title;
    document.getElementById('reader-content').innerHTML = '<div class="reader-text">' + lesson.content + '</div>';
    document.getElementById('reader-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    try {
      mermaid.init(undefined, document.querySelectorAll('.mermaid'));
    } catch(e) {
      console.error('Mermaid init error:', e);
    }
  }
  
  function closeReader() {
    document.getElementById('reader-modal').classList.add('hidden');
    document.body.style.overflow = 'auto';
  }

  function markLessonComplete(subjectId, lessonId) {
    const p = getSubjectProgress(subjectId);
    const completed = new Set(p.completedLessons || []);
    if (completed.has(lessonId)) return;
    completed.add(lessonId);
    p.completedLessons = Array.from(completed);
    p.lastLessonId = lessonId;
    saveSubjectProgress(subjectId, p);
    
    let streak = parseInt(localStorage.getItem('brio_streak_v1') || '0', 10) || 0;
    const lastDate = localStorage.getItem('brio_streak_date_v1');
    const today = new Date().toDateString();
    if (lastDate !== today) {
      streak += 1;
      localStorage.setItem('brio_streak_v1', streak);
      localStorage.setItem('brio_streak_date_v1', today);
    }
    
    showToast('Lesson marked complete!');
    renderLessons();
  }
  
  let currentSubject = null;
  
  function renderLessons() {
    if (!currentSubject) return;
    const lessonsEl = document.getElementById('subject-lessons');
    if (!lessonsEl) return;
    const sp = getSubjectProgress(currentSubject.id);
    const completed = new Set(sp.completedLessons||[]);
    lessonsEl.innerHTML = (currentSubject.lessons||[]).map(lesson => {
      const done = completed.has(lesson.id);
      const label = done ? 'Completed' : (lesson.id === sp.lastLessonId ? 'Resume' : 'Start');
      const disabled = done ? 'disabled' : '';
      const cls = done ? 'btn sage small' : 'btn small';
      const readBtn = lesson.content ? `<button type="button" class="btn blue small" style="margin-left:0.5rem;" onclick="event.stopPropagation();openReaderById('${lesson.id}')">Read</button>` : '';
      return `<div class="card" style="box-shadow:none;margin-bottom:1rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;">
          <div>
            <div style="font-weight:900;">${lesson.title}</div>
            <div style="font-weight:700;">${lesson.summary}</div>
          </div>
          <div style="display:flex;gap:0.3rem;">
            ${readBtn}
            <button type="button" class="${cls}" ${disabled} onclick="markLessonComplete('${currentSubject.id}','${lesson.id}')">${label}</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  async function loadSubjectPage() {
    const urlParams = new URLSearchParams(window.location.search);
    const specificSubjectId = urlParams.get('id');
    
    if (!specificSubjectId) {
      document.getElementById('error-message').style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/content/subjects.json');
      if (!res.ok) throw new Error('Unable to load subjects');
      const subjectsData = await res.json();
      
      // flatten
      subjectsData.semesters.forEach(sem => {
        sem.subjects.forEach(sub => {
          sub.semester = sem.name;
          subjectsFlat.push(sub);
        });
      });
      
      const subject = subjectsFlat.find(i => i.id === specificSubjectId);
      if (!subject) {
        document.getElementById('error-message').style.display = 'block';
        return;
      }
      
      currentSubject = subject;
      
      document.getElementById('subject-content').style.display = 'block';
      document.getElementById('subject-semester').innerText = subject.semester;
      document.getElementById('subject-title').innerText = subject.title;
      document.getElementById('subject-overview').innerText = subject.overview;
      document.getElementById('subject-credits').innerText = subject.credits;
      document.getElementById('subject-difficulty').innerText = subject.difficulty;
      const topics = document.getElementById('subject-topics');
      if (topics) topics.innerHTML = (subject.keyTopics||[]).map(t => `<span class="pill">${t}</span>`).join('');
      
      renderLessons();

      const quizzesEl = document.getElementById('subject-quizzes');
      if (quizzesEl) {
        quizzesEl.innerHTML = (subject.quizzes||[]).map(q =>
          `<div class="card" style="box-shadow:none;margin-bottom:1rem;">
            <div style="font-weight:900;">${q.q}</div>
            <div style="font-weight:700;color:var(--accent-sage);">${q.a}</div>
          </div>`
        ).join('');
      }

      const assignmentsEl = document.getElementById('subject-assignments');
      if (assignmentsEl) assignmentsEl.innerHTML = (subject.assignments||[]).map(i => `<li>${i}</li>`).join('');

      const resourcesEl = document.getElementById('subject-resources');
      if (resourcesEl) resourcesEl.innerHTML = (subject.resources||[]).map(i => `<li>${i}</li>`).join('');
      
    } catch (e) {
      console.error(e);
      document.getElementById('error-message').style.display = 'block';
      document.getElementById('error-message').innerText = 'Error loading subject data.';
    }
  }

  loadSubjectPage();
</script>
</body>
</html>
