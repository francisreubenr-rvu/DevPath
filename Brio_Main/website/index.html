<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>brio. — Learn by Building</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5EDD8;
    --fg: #110F0C;
    --amber: #E9A21B;
    --sage: #6B8F71;
    --rust: #C2552A;
    --cream: #F5EDD8;
    --white: #FFFFFF;
    --border: 3px solid #110F0C;
    --shadow: 5px 5px 0px #110F0C;
    --font-serif: 'Fraunces', serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--bg);
    color: var(--fg);
    font-family: var(--font-mono);
    padding: 0;
    overflow-x: hidden;
  }
  
  /* Sidebar Nav */
  aside {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 280px;
    background: var(--white);
    border-right: var(--border);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }
  .logo {
    font-family: var(--font-serif);
    font-size: 2.5rem;
    font-weight: 900;
    margin-bottom: 3rem;
    text-transform: lowercase;
  }
  .logo span { color: var(--amber); }
  
  nav ul { list-style: none; }
  nav li { margin-bottom: 1.5rem; }
  nav a {
    text-decoration: none;
    color: var(--fg);
    font-weight: 700;
    font-size: 1.1rem;
    display: block;
    padding: 0.5rem 1rem;
    border: 2px solid transparent;
    transition: all 0.1s;
  }
  nav a.active {
    background: var(--amber);
    border: var(--border);
    box-shadow: 4px 4px 0px var(--fg);
  }
  
  main {
    margin-left: 280px;
    padding: 3rem;
    max-width: 1200px;
  }
  
  .header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3rem;
  }
  h1 { font-family: var(--font-serif); font-size: 3rem; font-weight: 800; }
  
  .user-badge {
    background: var(--white);
    border: var(--border);
    padding: 0.75rem 1.5rem;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .tier-pill {
    background: var(--amber);
    padding: 0.2rem 0.6rem;
    font-size: 0.7rem;
    font-weight: 800;
    border: 2px solid var(--fg);
  }

  /* Dashboard Grid */
  .grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 2rem;
  }
  
  .card {
    background: var(--white);
    border: var(--border);
    padding: 2rem;
    box-shadow: var(--shadow);
    margin-bottom: 2rem;
  }
  .card h2 { font-family: var(--font-serif); margin-bottom: 1.5rem; border-bottom: 3px solid var(--amber); display: inline-block; }
  
  /* Kanban Style */
  .kanban {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    padding-bottom: 1rem;
  }
  .column {
    min-width: 250px;
    flex: 1;
    background: #F0F0F0;
    border: 2px solid var(--fg);
    padding: 1rem;
  }
  .column-title {
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.8rem;
    margin-bottom: 1rem;
    display: flex;
    justify-content: space-between;
  }
  .task-card {
    background: var(--white);
    border: 2px solid var(--fg);
    padding: 1rem;
    margin-bottom: 1rem;
    box-shadow: 3px 3px 0px var(--fg);
    cursor: grab;
  }
  .task-card:hover { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--fg); }
  .task-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.5rem; }
  .task-meta { font-size: 0.7rem; color: #666; }
  
  .pill {
    padding: 0.2rem 0.5rem;
    font-size: 0.6rem;
    font-weight: 800;
    border: 1px solid var(--fg);
    text-transform: uppercase;
  }
  .pill.high { background: var(--rust); color: white; }
  .pill.medium { background: var(--amber); }
  .pill.low { background: var(--sage); color: white; }
  
  /* Lessons List */
  .lesson-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem;
    border-bottom: 1px solid #EEE;
  }
  .lesson-item:last-child { border-bottom: none; }
  .submit-btn {
    background: var(--sage);
    color: white;
    border: 2px solid var(--fg);
    padding: 0.4rem 1rem;
    font-weight: 800;
    font-size: 0.8rem;
    cursor: pointer;
    box-shadow: 3px 3px 0px var(--fg);
  }
  .submit-btn:hover { box-shadow: 1px 1px 0px var(--fg); transform: translate(2px, 2px); }
  .submit-btn.passed { background: var(--white); color: var(--sage); border-color: var(--sage); cursor: default; box-shadow: none; transform: none; }

  /* Notification Toast */
  #toast {
    position: fixed;
    bottom: 2rem; right: 2rem;
    background: var(--fg);
    color: var(--amber);
    padding: 1rem 2rem;
    border: var(--border);
    box-shadow: var(--shadow);
    display: none;
    z-index: 1000;
    font-weight: 800;
  }
</style>
</head>
<body>

<aside>
  <div class="logo">bri<span>o</span>.</div>
  <nav>
    <ul>
      <li><a href="#" class="active">Dashboard</a></li>
      <li><a href="#">My Projects</a></li>
      <li><a href="#">Learning Path</a></li>
      <li><a href="#">AI Mentor</a></li>
      <li><a href="#">Settings</a></li>
    </ul>
  </nav>
  <div style="margin-top: auto;">
    <p style="font-size: 0.7rem; font-weight: 700; color: #8A8278;">LOGGED IN AS</p>
    <div id="sidebar-user" style="font-weight: 800; font-size: 1.1rem;">Aarav Mehta</div>
  </div>
</aside>

<main>
  <div class="header-bar">
    <h1 id="greeting">Hi, Aarav!</h1>
    <div class="user-badge">
      <div id="stat-progress" style="text-align: center;">
        <span style="display: block; font-size: 0.7rem; font-weight: 800;">TOTAL PROGRESS</span>
        <span id="user-progress-val" style="font-size: 1.5rem; font-weight: 900;">65%</span>
      </div>
      <div style="width: 2px; height: 40px; background: #000;"></div>
      <div>
        <span id="user-full-name" style="font-weight: 800;">Aarav Mehta</span>
        <span id="user-tier" class="tier-pill">PRO</span>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="left-col">
      <div class="card">
        <h2>Active Project: <span id="proj-name">TaskFlow AI</span></h2>
        <div class="kanban">
          <div class="column" id="col-locked">
            <div class="column-title">Locked <span id="cnt-locked">0</span></div>
            <div class="tasks"></div>
          </div>
          <div class="column" id="col-todo">
            <div class="column-title">To Do <span id="cnt-todo">0</span></div>
            <div class="tasks"></div>
          </div>
          <div class="column" id="col-done">
            <div class="column-title">Done <span id="cnt-done">0</span></div>
            <div class="tasks"></div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="right-col">
      <div class="card">
        <h2>Next Lessons</h2>
        <div id="lessons-list">
          <!-- Lessons loaded here -->
          <div class="lesson-item">Loading path...</div>
        </div>
      </div>
      
      <div class="card" style="background: var(--rust); color: var(--cream);">
        <h2 style="border-color: var(--cream);">Brio Stats</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div style="text-align: center;">
             <span id="user-subs" style="font-size: 2.5rem; font-weight: 900; display: block;">--</span>
             <span style="font-size: 0.7rem; font-weight: 800;">SUBMISSIONS</span>
          </div>
          <div style="text-align: center;">
             <span id="user-score" style="font-size: 2.5rem; font-weight: 900; display: block;">--</span>
             <span style="font-size: 0.7rem; font-weight: 800;">AVG SCORE</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script>
  const API_URL = 'http://localhost:3001/api';
  const CURRENT_USER_ID = 1; // Defaulting to Aarav for demo

  async function init() {
    await loadProfile();
    await loadProjects();
    await loadLessons();
  }

  async function loadProfile() {
    const res = await fetch(`${API_URL}/profile/${CURRENT_USER_ID}`);
    const data = await res.json();
    document.getElementById('user-full-name').innerText = data.full_name;
    document.getElementById('sidebar-user').innerText = data.full_name;
    document.getElementById('greeting').innerText = `Hi, ${data.full_name.split(' ')[0]}!`;
    document.getElementById('user-tier').innerText = data.sub_tier.toUpperCase();
    document.getElementById('user-progress-val').innerText = data.avg_course_progress + '%';
    document.getElementById('user-subs').innerText = data.total_submissions;
    document.getElementById('user-score').innerText = data.avg_ai_score;
  }

  async function loadProjects() {
    const res = await fetch(`${API_URL}/projects/${CURRENT_USER_ID}`);
    const data = await res.json();
    if (data.length > 0) {
      const p = data[0];
      document.getElementById('proj-name').innerText = p.proj_name;
      loadKanban(p.project_id);
    }
  }

  async function loadKanban(projectId) {
    const res = await fetch(`${API_URL}/kanban/${projectId}`);
    const tasks = await res.json();
    
    const cols = {
        locked: { el: document.querySelector('#col-locked .tasks'), count: 0 },
        todo: { el: document.querySelector('#col-todo .tasks'), count: 0 },
        done: { el: document.querySelector('#col-done .tasks'), count: 0 }
    };
    
    Object.values(cols).forEach(c => c.el.innerHTML = '');
    
    tasks.forEach(t => {
        const type = t.status === 'locked' ? 'locked' : (t.status === 'done' ? 'done' : 'todo');
        cols[type].count++;
        const card = document.createElement('div');
        card.className = 'task-card';
        card.innerHTML = `
          <div class="task-name">${t.task_name}</div>
          <div class="task-meta">
            <span class="pill ${t.priority}">${t.priority}</span>
            ${t.skill_req ? `<span style="margin-left:5px">Requires: ${t.skill_req}</span>` : ''}
          </div>
        `;
        cols[type].el.appendChild(card);
    });
    
    document.getElementById('cnt-locked').innerText = cols.locked.count;
    document.getElementById('cnt-todo').innerText = cols.todo.count;
    document.getElementById('cnt-done').innerText = cols.done.count;
  }

  async function loadLessons() {
    const res = await fetch(`${API_URL}/lessons/${CURRENT_USER_ID}`);
    const lessons = await res.json();
    const list = document.getElementById('lessons-list');
    list.innerHTML = '';
    
    lessons.slice(0, 5).forEach(l => {
      const item = document.createElement('div');
      item.className = 'lesson-item';
      const isPassed = l.ai_score >= 70;
      
      item.innerHTML = `
        <div>
          <div style="font-weight:700; font-size:0.9rem;">${l.title}</div>
          <div style="font-size:0.7rem; color:#666;">Lesson ${l.lesson_no} • ${l.course_title}</div>
        </div>
        ${isPassed ? 
          `<span class="submit-btn passed">PASSED (${l.ai_score})</span>` : 
          `<button class="submit-btn" onclick="submitLesson(${l.lesson_id})">SUBMIT</button>`}
      `;
      list.appendChild(item);
    });
  }

  async function submitLesson(id) {
    const score = 70 + Math.floor(Math.random() * 30); // Random passing score
    const res = await fetch(`${API_URL}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: CURRENT_USER_ID, lessonId: id, score })
    });
    const data = await res.json();
    showToast(data.message);
    init(); // Refresh everything to see trigger effect
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  init();
</script>

</body>
</html>
